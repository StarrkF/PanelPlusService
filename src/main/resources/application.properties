spring.application.name=PanelPlus

spring.datasource.url=jdbc:postgresql://localhost:5432/panel_plus
spring.datasource.username=postgres
spring.datasource.password=

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true



# JWT settings dummy
security.jwt.secret=ZmFrZV9wYW5lbF9wbHVzX3NlY3JldF9rZXk=
security.jwt.expiration-ms=86400000

server.servlet.context-path=/api

# Sadece bu iki satır kalsın, config-url ve url satırlarını silip deneyin
springdoc.swagger-ui.path=/api.html
springdoc.api-docs.path=/v3/api-docs